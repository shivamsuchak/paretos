<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>paretos — Pipeline monitor</title>
<style>
@font-face{font-family:'Aeonik Pro';font-weight:400;font-style:normal;font-display:swap;src:local('Aeonik Pro'),local('AeonikPro-Regular')}
@font-face{font-family:'Aeonik Pro';font-weight:500;font-style:normal;font-display:swap;src:local('Aeonik Pro Medium'),local('AeonikPro-Medium')}
:root {
  /* Neutrals */
  --black:       #000000;
  --black-60:    #666666;
  --black-40:    #999999;
  --black-20:    #CCCCCC;
  --black-10:    rgba(0,0,0,0.10);
  --black-5:     rgba(0,0,0,0.05);
  --silver:      #F2F2F2;
  --white:       #FFFFFF;

  /* Brand accents */
  --violet:      #5F26E0;
  --violet-5:    #F7F4FD;
  --violet-10:   #EFE9FC;
  --violet-20:   #DFD4F9;
  --pink:        #F500E1;
  --yellow:      #FBB03B;
  --slate:       #AAA3CC;

  /* Semantic */
  --green:       #00C04D;
  --green-bg:    #E6F9ED;
  --red:         #FB6C4A;
  --red-bg:      #FFF0ED;
  --warn:        #FBB03B;
  --warn-bg:     #FFF6E6;
  --info:        #51D7E6;
  --info-bg:     #E6F9F9;

  /* Brand gradient */
  --gradient:    linear-gradient(45.03deg, #F500E1 0%, #FBB03B 100%);

  /* Typography */
  --sans:        'Aeonik Pro', Roboto, Helvetica, Arial, sans-serif;
  --mono:        'Consolas', 'Courier New', monospace;

  /* Spacing & motion */
  --ease:        0.3s ease-out;
  --r:           7px;
  --r-lg:        10px;
  --r-pill:      999px;
  --shadow:      0 0 10px rgba(0,0,0,0.15);
}

@media(prefers-reduced-motion:reduce){*{transition-duration:0.01ms !important;animation-duration:0.01ms !important}}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--sans);font-size:16px;line-height:1.25;
  background:var(--white);color:var(--black);
  height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;
  font-variant-numeric:tabular-nums;
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--black-20);border-radius:2px}

/* ━━━ Layout: topbar + body(sidebar | content) ━━━ */
.shell{display:grid;grid-template-rows:60px 1fr;height:100vh}

/* ── Topbar (60px) ── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px 0 0;background:var(--white);border-bottom:1px solid var(--black-20);
  height:60px;
}
.hdr-l{display:flex;align-items:center;gap:12px;height:100%}
.hdr-l .logo-box{
  width:60px;height:60px;display:flex;align-items:center;justify-content:center;
  background:var(--gradient);flex-shrink:0;
}
.hdr-l .logo-box svg{width:28px;height:28px}
.hdr-l .logo{
  font-weight:500;font-size:19.2px;color:var(--black);
  letter-spacing:-0.192px;margin-left:12px;
}
.hdr-l .tag{
  font-family:var(--mono);font-size:12px;font-weight:400;
  color:var(--black-40);
  padding:2px 8px;border:1px solid var(--black-20);border-radius:3px;
  letter-spacing:0.24px;text-transform:uppercase;
}
.hdr-r{display:flex;align-items:center;gap:20px}
.hdr-r .clock{font-family:var(--mono);font-size:14px;color:var(--black-40);font-variant-numeric:tabular-nums}
.hdr-r .clock.on{color:var(--black)}
.hdr-r .dot{width:8px;height:8px;border-radius:50%;background:var(--red);transition:background var(--ease)}
.hdr-r .dot.ok{background:var(--green)}
.hdr-r .dot.run{background:var(--green);animation:blink 1.4s ease-in-out infinite}
.hdr-r .st{font-size:14px;color:var(--black-40)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

/* ── Body: sidebar + content ── */
.body{display:grid;grid-template-columns:240px 1fr;overflow:hidden}

/* ── Left: vertical pipeline sidebar ── */
.graph{
  background:var(--white);border-right:1px solid var(--black-20);
  padding:20px 12px;overflow-y:auto;
  display:flex;flex-direction:column;gap:0;
}
.graph .g-title{
  font-size:12px;font-weight:500;text-transform:uppercase;
  letter-spacing:0.6px;color:rgba(0,0,0,0.4);margin-bottom:20px;
  padding:0 10px;
}

/* Node row */
.g-node{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:var(--r);
  cursor:pointer;transition:background var(--ease);position:relative;
}
.g-node:hover{background:var(--silver)}
.g-node.active{background:var(--violet-5)}
.g-node.done .g-num{background:var(--black);color:var(--white);border-color:var(--black)}

/* Step number circle */
.g-num{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;font-weight:400;
  color:var(--black-40);background:var(--white);
  border:1px solid var(--black-20);transition:all var(--ease);
}
.g-node.active .g-num{border-color:var(--violet);color:var(--violet);background:var(--violet-5)}

/* Label + time */
.g-info{display:flex;flex-direction:column;gap:1px;min-width:0}
.g-name{font-size:14px;font-weight:400;color:var(--black-60);transition:color var(--ease)}
.g-node.active .g-name{color:var(--black);font-weight:500}
.g-node.done .g-name{color:var(--black)}
.g-elapsed{font-family:var(--mono);font-size:12px;color:var(--black-40)}

/* Connector line between nodes */
.g-line{
  width:1px;height:12px;background:var(--black-20);
  margin-left:22px;flex-shrink:0;transition:background var(--ease);
}
.g-line.lit{background:var(--violet);opacity:0.5}

/* Active indicator dot */
.g-node.active::after{
  content:'';position:absolute;left:15px;top:50%;transform:translate(-50%,-50%);
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--violet);opacity:0;
  animation:ring 1.6s ease-out infinite;
}
@keyframes ring{0%{opacity:.3;transform:translate(-50%,-50%) scale(.85)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.4)}}

/* ── Right: feed + inspector ── */
.right{display:grid;grid-template-columns:1fr 320px;overflow:hidden}

/* Feed */
.feed{overflow-y:auto;background:var(--white)}

.row{
  display:grid;grid-template-columns:56px 80px 1fr;
  padding:4px 20px;transition:background 150ms;
  animation:up 200ms ease-out;
  border-bottom:1px solid rgba(0,0,0,0.03);
}
.row:hover{background:var(--silver)}
.row.hi{background:var(--violet-5)}
@keyframes up{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

.row .r-t{font-family:var(--mono);font-size:12px;color:var(--black-40);line-height:1.9}
.row .r-a{
  font-family:var(--mono);font-size:12px;font-weight:400;
  text-align:right;padding-right:10px;line-height:1.9;
  border-right:1px solid var(--black-20);
  color:var(--violet);
}
.row .r-b{padding-left:10px;font-size:14px;color:var(--black-60);line-height:1.65}
.row .r-b b{color:var(--black);font-weight:500}

.f-done{padding:20px;text-align:center;font-size:14px;font-weight:500;color:var(--green)}

/* Inspector */
.insp{overflow-y:auto;background:var(--white);border-left:1px solid var(--black-20)}
.insp .i-bar{
  position:sticky;top:0;z-index:2;
  padding:12px 20px;background:var(--white);border-bottom:1px solid var(--black-20);
}
.insp .i-bar span{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.6px;color:rgba(0,0,0,0.4)}

.i-empty{padding:20px;font-size:14px;color:var(--black-40);line-height:1.6}

.i-card{
  margin:10px;padding:12px 16px;
  background:var(--white);border:1px solid var(--black-20);
  border-radius:var(--r);position:relative;overflow:hidden;
}
.i-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--violet);
}
.i-card .ic-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.i-card .ic-name{font-size:14px;font-weight:500;color:var(--black)}
.i-card .ic-cnt{font-family:var(--mono);font-size:12px;color:var(--black-40)}
.i-card .ic-row{font-size:14px;color:var(--black-60);padding:3px 0;line-height:1.55}
.i-card .ic-row b{font-family:var(--mono);font-size:12px;color:var(--black);font-weight:500}

/* ── Results panel ── */
.res-wrap{padding:20px;animation:fadeIn 400ms ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.res-section{margin-bottom:20px}
.res-section .rs-title{
  font-size:12px;font-weight:500;text-transform:uppercase;
  letter-spacing:0.6px;color:rgba(0,0,0,0.4);margin-bottom:10px;
}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi{
  background:var(--white);border:1px solid var(--black-20);
  border-radius:var(--r);padding:12px 16px;position:relative;overflow:visible;
  cursor:default;
}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--black);border-radius:var(--r) var(--r) 0 0}
.kpi.warn::before{background:var(--warn)}
.kpi.err::before{background:var(--red)}
.kpi .kpi-label{font-size:12px;font-weight:400;letter-spacing:0.24px;color:var(--black-40);margin-bottom:4px;display:flex;align-items:center;gap:5px}
.kpi .kpi-val{font-family:var(--mono);font-size:19.2px;font-weight:500;color:var(--black)}
.kpi .kpi-sub{font-size:12px;color:var(--black-40);margin-top:4px}

/* Tooltip */
.kpi-tip{position:relative;display:inline-flex;align-items:center;justify-content:center;
  width:14px;height:14px;border-radius:999px;background:var(--black-10);
  font-size:10px;font-weight:500;color:var(--black-40);cursor:help;flex-shrink:0;
  font-family:var(--sans);line-height:1;
}
.kpi-tip::after{
  content:attr(data-tip);
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:var(--black);color:var(--white);
  font-size:12px;font-weight:400;line-height:1.55;letter-spacing:0;
  padding:10px 14px;border-radius:var(--r);
  width:280px;max-width:340px;
  white-space:normal;
  opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity 0.15s ease,visibility 0.15s ease;
  z-index:100;box-shadow:var(--shadow);
}
.kpi-tip:hover::after{opacity:1;visibility:visible}
/* Edge guards: flip tooltip down if near top */
.kpi-tip.flip::after{bottom:auto;top:calc(100% + 8px)}

/* Plan table */
.plan-tbl{width:100%;border-collapse:collapse;font-size:14px}
.plan-tbl th{
  text-align:left;padding:6px 10px;font-size:12px;font-weight:500;
  letter-spacing:0.24px;
  color:var(--black-40);border-bottom:1px solid var(--black-20);
}
.plan-tbl td{
  padding:6px 10px;border-bottom:1px solid var(--black-20);
  font-family:var(--mono);font-size:14px;color:var(--black-60);
}
.plan-tbl tr:hover td{background:var(--silver)}

/* Risk cards */
.risk-card{
  background:var(--white);border:1px solid var(--black-20);
  border-radius:var(--r);padding:12px 16px;margin-bottom:10px;
  position:relative;overflow:hidden;
}
.risk-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.risk-card.sev-low::before{background:var(--green)}
.risk-card.sev-moderate::before{background:var(--warn)}
.risk-card.sev-elevated::before{background:var(--red)}
.risk-card.sev-critical::before{background:var(--red)}
.risk-title{font-size:14px;font-weight:500;color:var(--black);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.risk-badge{font-size:10px;font-weight:500;text-transform:uppercase;padding:2px 8px;border-radius:3px;color:var(--white)}
.risk-badge.low{background:var(--green)}
.risk-badge.moderate{background:var(--warn)}
.risk-badge.elevated{background:var(--red)}
.risk-badge.critical{background:var(--red)}
.risk-desc{font-size:14px;color:var(--black-60);margin-bottom:8px;line-height:1.5}
.risk-meta{display:flex;gap:16px;font-size:12px;color:var(--black-40);font-family:var(--mono)}
.risk-mitigation{font-size:12px;color:var(--violet);margin-top:6px;font-style:italic}

/* Marketplace atom grid */
.atom-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:10px}
.atom-card{
  background:var(--white);border:1px solid var(--black-20);
  border-radius:var(--r);padding:10px 12px;font-size:12px;
}
.atom-card.st-open{border-left:3px solid var(--green)}
.atom-card.st-claimed{border-left:3px solid var(--warn)}
.atom-card.st-filled{border-left:3px solid var(--black-40)}
.atom-time{font-family:var(--mono);color:var(--black);font-weight:500}
.atom-act{color:var(--black-60);margin:2px 0}
.atom-hc{font-family:var(--mono);color:var(--black-40)}
.atom-price{font-family:var(--mono);color:var(--green);font-weight:500}

/* Human Review Panel */
.review-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.4);z-index:1000;
  display:flex;align-items:center;justify-content:center;
}
.review-panel{
  background:var(--white);border:1px solid var(--black-20);
  border-radius:var(--r-lg);padding:30px;max-width:720px;width:90%;
  max-height:85vh;overflow-y:auto;
  box-shadow:var(--shadow);
}
.review-panel h2{font-size:19.2px;font-weight:500;letter-spacing:-0.192px;color:var(--black);margin:0 0 20px;display:flex;align-items:center;gap:10px}
.review-plan-table{width:100%;border-collapse:collapse;margin:10px 0 20px;font-size:14px}
.review-plan-table th{text-align:left;color:var(--black-40);font-weight:500;padding:6px 10px;border-bottom:1px solid var(--black-20)}
.review-plan-table td{padding:6px 10px;color:var(--black-60);font-family:var(--mono)}
.review-actions{display:flex;gap:12px;margin-top:24px;justify-content:flex-end}
.btn-approve{
  background:var(--black);color:var(--white);border:none;padding:10px 24px;
  border-radius:var(--r);font-weight:500;font-size:14px;cursor:pointer;
  font-family:var(--sans);transition:all var(--ease);
}
.btn-approve:hover{background:var(--black-60)}
.btn-reject{
  background:var(--white);color:var(--black);border:1px solid var(--black-20);padding:10px 24px;
  border-radius:var(--r);font-weight:500;font-size:14px;cursor:pointer;
  font-family:var(--sans);transition:all var(--ease);
}
.btn-reject:hover{border-color:var(--black-60);background:var(--silver)}
.review-risk-summary{
  display:flex;gap:16px;margin:12px 0;padding:16px;
  background:var(--white);border-radius:var(--r);border:1px solid var(--black-20);
}
.review-risk-score{
  font-size:32px;font-weight:500;font-family:var(--mono);
  min-width:80px;text-align:center;line-height:1;
}
.review-risk-score.low{color:var(--green)}
.review-risk-score.moderate{color:var(--warn)}
.review-risk-score.elevated{color:var(--red)}
.review-risk-score.critical{color:var(--red)}
.review-risk-label{font-size:12px;color:var(--black-40);text-align:center;margin-top:6px}

/* Week picker overlay */
.week-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.4);z-index:1000;
  display:flex;align-items:center;justify-content:center;
}
.week-panel{
  background:var(--white);border:1px solid var(--black-20);
  border-radius:var(--r-lg);padding:30px;max-width:520px;width:90%;
  max-height:85vh;overflow-y:auto;
  box-shadow:var(--shadow);
}
.week-panel h2{
  font-size:19.2px;font-weight:500;letter-spacing:-0.192px;
  color:var(--black);margin:0 0 6px;
}
.week-panel .wp-sub{
  font-size:14px;color:var(--black-40);margin-bottom:20px;
}
.week-list{display:flex;flex-direction:column;gap:6px}
.week-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border:1px solid var(--black-20);border-radius:var(--r);
  cursor:pointer;transition:all var(--ease);font-size:14px;
  background:var(--white);
}
.week-item:hover{border-color:var(--violet);background:var(--violet-5)}
.week-item .wi-label{color:var(--black);font-weight:400}
.week-item .wi-date{font-family:var(--mono);font-size:12px;color:var(--black-40)}
.week-item .wi-badge{
  font-size:10px;font-weight:500;text-transform:uppercase;
  padding:2px 8px;border-radius:3px;letter-spacing:0.24px;
}
.week-item .wi-badge.training{background:var(--green-bg);color:var(--green)}
.week-item .wi-badge.holdout{background:var(--warn-bg);color:var(--warn)}

/* Debrief */
.debrief-box{
  background:var(--white);border:1px solid var(--black-20);
  border-radius:var(--r);padding:16px;font-size:14px;
  color:var(--black-60);line-height:1.65;white-space:pre-wrap;
  max-height:300px;overflow-y:auto;
}
.debrief-box h1,.debrief-box h2,.debrief-box h3{font-size:14px;font-weight:500;color:var(--black);margin:10px 0 4px}
.debrief-box strong{color:var(--black);font-weight:500}

/* Tabs for switching feed/results */
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--black-20);background:var(--white)}
.tab-btn{
  padding:10px 20px;font-size:14px;font-weight:400;
  color:var(--black-40);cursor:pointer;
  border:none;background:none;border-bottom:2px solid transparent;
  transition:all var(--ease);font-family:var(--sans);
}
.tab-btn:hover{color:var(--black-60)}
.tab-btn.active{color:var(--black);border-bottom-color:var(--black);font-weight:500}
.tab-panel{display:none;overflow-y:auto}
.tab-panel.show{display:block}
</style>
</head>
<body>
<div class="shell">

  <div class="hdr">
    <div class="hdr-l">
      <div class="logo-box">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 4C9.373 4 4 9.373 4 16s5.373 12 12 12 12-5.373 12-12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="logo">paretos</span>
      <span class="tag">pipeline monitor</span>
    </div>
    <div class="hdr-r">
      <span class="clock" id="timer">00:00</span>
      <div class="dot" id="sDot"></div>
      <span class="st" id="sTxt">Connecting</span>
    </div>
  </div>

  <div class="body">

    <!-- Vertical graph -->
    <div class="graph">
      <div class="g-title">Pipeline</div>
      <div id="graphContainer"></div>
    </div>

    <!-- Feed + Results + Inspector -->
    <div class="right">
      <div style="display:flex;flex-direction:column;overflow:hidden">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="showTab('feed')">Activity log</button>
          <button class="tab-btn" id="resultsTab" onclick="showTab('results')" style="display:none">Results</button>
          <button class="tab-btn" id="marketTab" onclick="showTab('market')" style="display:none">Marketplace</button>
          <span style="flex:1"></span>
          <span class="cnt" id="traceCount" style="padding:10px 20px;font-family:var(--mono);font-size:12px;color:var(--black-40)">0 events</span>
        </div>
        <div class="tab-panel show" id="feedPanel" style="overflow-y:auto">
          <div id="feed"></div>
        </div>
        <div class="tab-panel" id="resultsPanel" style="overflow-y:auto">
          <div id="resultsBody"></div>
        </div>
        <div class="tab-panel" id="marketPanel" style="overflow-y:auto">
          <div id="marketBody"></div>
        </div>
      </div>
      <div class="insp">
        <div class="i-bar"><span>Inspector</span></div>
        <div id="inspBody">
          <div class="i-empty">Select a pipeline step to inspect its reasoning trace.</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const NODES=[
  {id:'forecast',label:'Forecast',num:1},
  {id:'knowledge',label:'Knowledge',num:2},
  {id:'regime',label:'Regime Detection',num:3},
  {id:'planning',label:'Planning',num:4},
  {id:'cost_opt',label:'Cost Optimisation',num:5},
  {id:'red_team',label:'Red Team',num:6},
  {id:'human_review',label:'Human Review',num:7},
  {id:'debrief',label:'Debrief Report',num:8}
];
const A2N={forecast:'forecast',knowledge:'knowledge',regime:'regime',planning:'planning',cost:'cost_opt',cost_opt:'cost_opt',red_team:'red_team',human_review:'human_review',debrief:'debrief'};

let ws,traces={},t0=null,ti=null,sel=null,totalTraces=0;

// Build vertical graph
(function(){
  const c=document.getElementById('graphContainer');
  NODES.forEach((n,i)=>{
    if(i>0){const l=document.createElement('div');l.className='g-line';l.id='line-'+n.id;c.appendChild(l)}
    const el=document.createElement('div');
    el.className='g-node';el.id='nd-'+n.id;
    el.onclick=()=>inspect(n.id);
    el.innerHTML=
      `<div class="g-num" id="num-${n.id}">${n.num}</div>`+
      `<div class="g-info"><span class="g-name">${n.label}</span><span class="g-elapsed" id="et-${n.id}">&mdash;</span></div>`;
    c.appendChild(el);
  });
})();

function connect(){
  ws=new WebSocket('ws://localhost:8767');
  ws.onopen=()=>{$('sDot').className='dot ok';$('sTxt').textContent='Connected'};
  ws.onclose=()=>{$('sDot').className='dot';$('sTxt').textContent='Disconnected';setTimeout(connect,2000)};
  ws.onerror=()=>{$('sTxt').textContent='Retrying'};
  ws.onmessage=e=>{const m=JSON.parse(e.data);({node_active:activate,node_done:complete,thinking:addRow,pipeline_results:showResults,pipeline_done:done,review_request:showReviewPanel,available_weeks:showWeekPicker})[m.type]?.(m)};
}

function activate(m){
  const nid=A2N[m.agent]||m.agent;
  if(!t0){t0=Date.now();tick();$('sDot').className='dot run';$('sTxt').textContent='Running'}
  document.querySelectorAll('.g-node.active').forEach(n=>n.classList.remove('active'));
  const el=$('nd-'+nid);
  if(el){el.classList.remove('done');el.classList.add('active');el.dataset.t0=Date.now()}
  const ln=$('line-'+nid);if(ln)ln.classList.add('lit');
}

function complete(m){
  const nid=A2N[m.agent]||m.agent;
  const el=$('nd-'+nid);if(!el)return;
  el.classList.remove('active');el.classList.add('done');
  const s=el.dataset.t0?((Date.now()-parseInt(el.dataset.t0))/1000).toFixed(1)+'s':'';
  const et=$('et-'+nid);if(et)et.textContent=s;
}

function addRow(m){
  const nid=A2N[m.agent]||m.agent;
  const nel=$('nd-'+nid);
  if(nel)activate(m);

  if(!traces[m.agent])traces[m.agent]=[];
  traces[m.agent].push(m);
  totalTraces++;
  $('traceCount').textContent=totalTraces+' events';

  const feed=$('feed');
  const r=document.createElement('div');
  r.className='row hi';
  const col=m.agent;
  r.innerHTML=
    `<span class="r-t">${m.timestamp}</span>`+
    `<span class="r-a">${col}</span>`+
    `<span class="r-b"><b>${m.step}</b> ${esc(m.detail)}</span>`;
  feed.appendChild(r);
  feed.scrollTop=feed.scrollHeight;
  setTimeout(()=>r.classList.remove('hi'),350);

  if(sel===m.agent||sel===nid)inspect(nid);
}

function inspect(nid){
  sel=nid;
  const p=$('inspBody');
  const keys=Object.entries(A2N).filter(([,v])=>v===nid).map(([k])=>k);
  keys.push(nid);
  let tt=[];keys.forEach(k=>{if(traces[k])tt=tt.concat(traces[k])});

  if(!tt.length){p.innerHTML='<div class="i-empty">No traces yet for this step.</div>';return}

  const info=NODES.find(n=>n.id===nid);
  let h=`<div class="i-card"><div class="ic-head"><span class="ic-name">${info?info.label:nid}</span><span class="ic-cnt">${tt.length} steps</span></div>`;
  tt.forEach(t=>{h+=`<div class="ic-row"><b>${t.timestamp} ${t.step}</b> ${esc(t.detail)}</div>`});
  h+='</div>';
  p.innerHTML=h;p.scrollTop=p.scrollHeight;
}

function showResults(r){
  const b=$('resultsBody');
  const fc=r.forecast||{};
  const rg=r.regime||{};
  const plan=r.plan||[];
  const cost=r.cost||{};
  const nv=r.newsvendor||{};
  const mc=r.monte_carlo||{};
  const totalPd=plan.reduce((s,p)=>s+p.pd,0);

  let h='<div class="res-wrap">';

  // ── Row 1: Core KPIs ──
  h+='<div class="res-section"><div class="rs-title">Key metrics</div><div class="kpi-row">';
  const fcTip='Mean Absolute Percentage Error of the volume forecast. Below 5% means the forecast is reliable and corrections can be trusted. Above 15% means high uncertainty — plan conservatively. This value is computed from forecast vs realised picks, outbound, and inbound volumes.';
  h+=kpi('Forecast','MAPE '+(fc.mape_pct!=null?fc.mape_pct+'%':'N/A'),fc.status||'',fc.mape_pct>15?'warn':'',fcTip);
  const staffTip='Total operative person-days across the planned week, after bias correction and newsvendor optimisation. Compare this to historical demand (avg ~54 pd/day x 5 = ~270 pd). Lower means the system is trimming overstaffing from the raw optimiser. Check the daily breakdown table to spot uneven distribution.';
  h+=kpi('Total Staff',totalPd.toFixed(1)+' pd',plan.length+' days planned','',staffTip);
  h+='</div><div class="kpi-row">';
  const appTip=r.approved?'The plan was approved by the planner. The staffing numbers will be submitted. If you see issues after approval, re-run the pipeline with different parameters.':'The plan is waiting for human approval. Review the risk scenarios and daily plan below before deciding. Rejecting sends it back for re-optimisation.';
  h+=kpi('Approval',r.approved?'Approved':'Pending','Human review gate',r.approved?'':'warn',appTip);
  const regSub=rg.detected?(rg.method?rg.method.toUpperCase():'detected')+' — '+(rg.confidence||''):'No change';
  const regTip=rg.detected?'A structural change in the relationship between recommended and actual staffing was detected (e.g. new equipment, process change). The planning agent adjusts its bias correction accordingly. Review what caused the shift before trusting the new correction.':'No structural change detected. The historical bias correction remains valid. A shift would indicate events like pick-by-light installation or seasonal volume changes that alter staffing needs.';
  h+=kpi('Regime',rg.detected?'Shift':'Stable',regSub,rg.detected?'warn':'',regTip);
  h+='</div>';

  // ── Row 2: Cost performance ──
  if(cost.baseline_cost||cost.plan_cost){
    h+='<div class="kpi-row">';
    const costTip='Expected weekly staffing cost after all corrections, estimated via 1,000 Monte Carlo simulations sampling from historical demand. The baseline is what the raw optimiser would cost without any corrections. Lower plan cost means the learning loop is working. This is an estimate — actual cost depends on realised demand.';
    h+=kpi('Plan Cost','€'+fmt(cost.plan_cost),'vs baseline €'+fmt(cost.baseline_cost),'',costTip);
    const gapCls=cost.gap_closure_pct>50?'':cost.gap_closure_pct>20?'warn':'err';
    const gapTip='How much of the gap between baseline cost (doing nothing) and perfect cost (impossible to achieve) is closed by our plan. Above 50% is strong. 20-50% is moderate — look for regime shifts or knowledge notes that could improve corrections. Below 20% means corrections may be miscalibrated.';
    h+=kpi('Gap Closure',cost.gap_closure_pct+'%','Savings €'+fmt(cost.savings),gapCls,gapTip);
    h+='</div><div class="kpi-row">';
    const overTip='Expected number of days where planned staff exceeds actual demand. Overstaffing costs EUR 230 per surplus person-day (idle wages). Some overstaffing is acceptable as insurance against SLA penalties, but consistent overstaffing means the bias correction is too conservative.';
    h+=kpi('Days Over',cost.days_overstaffed||0,'Overstaffed','',overTip);
    const underTip='Expected number of days where planned staff falls short of demand. Understaffing costs EUR 41/pd as overtime, but beyond 2.0 pd shortfall it jumps to EUR 600/pd (SLA penalty). The newsvendor optimiser deliberately leans slightly under because overstaffing is 5.5x more expensive per unit. Watch for more than 2 days — that signals the plan is too aggressive.';
    h+=kpi('Days Under',cost.days_understaffed||0,'Understaffed',cost.days_understaffed>2?'warn':'',underTip);
    h+='</div>';
  }

  // ── Row 3: Newsvendor & Monte Carlo ──
  if(nv.critical_ratio||mc.historical_errors){
    h+='<div class="kpi-row">';
    const nvTip='The newsvendor model balances overstaffing cost (EUR 230/pd) vs understaffing cost (EUR 41/pd). The critical ratio of 15.3% means we target the 15th percentile of the error distribution — deliberately planning slightly lean. The offset is the per-day adjustment applied after bias correction. A negative offset means we trim further; positive means we add a buffer.';
    h+=kpi('Newsvendor',(nv.critical_ratio*100).toFixed(1)+'th pctl','Optimal offset '+(nv.optimal_offset>=0?'+':'')+nv.optimal_offset+' pd/day','',nvTip);
    const mcTip='Simulates 101 different staffing offsets against historical demand to find the cost-minimising adjustment. More historical days = more reliable. The optimal offset from this simulation is applied on top of the bias-corrected plan. If this disagrees with the newsvendor quantile, the MC result takes priority because it accounts for the full cost structure including SLA penalties.';
    h+=kpi('Monte Carlo',mc.historical_errors+' days sim\'d',mc.simulated_offsets+' offsets tested','',mcTip);
    h+='</div>';
  }

  // ── Row 4: Risk Assessment ──
  const risk=r.risk_assessment||{};
  if(risk.scenarios&&risk.scenarios.length){
    const riskCls=risk.overall_risk_score>60?'err':risk.overall_risk_score>30?'warn':'';
    h+='<div class="kpi-row">';
    const riskTip='Composite adversarial risk score from the red team agent. Combines probability, cost impact, and expected regret across all failure scenarios. 0-25 = low (safe to approve), 25-50 = moderate (review mitigations), 50-75 = high (consider adjustments), 75+ = critical (strongly consider rejecting). The score helps decide whether to approve, modify, or reject the plan.';
    h+=kpi('Risk Score',risk.overall_risk_score+'/100',risk.risk_level+' risk',riskCls,riskTip);
    const regretTip='Sum of (probability x cost) across all adversarial scenarios. This is the expected monetary loss if risks materialise as estimated. Compare to plan savings — if regret exceeds savings, the plan may not be worth the risk. Fragile days are dates where multiple risk scenarios overlap, making them especially vulnerable.';
    h+=kpi('Expected Regret','€'+fmt(risk.total_expected_regret),risk.fragile_days&&risk.fragile_days.length?risk.fragile_days.length+' fragile days':'No fragile days',riskCls,regretTip);
    h+='</div>';
    h+='<div class="res-section"><div class="rs-title">Adversarial Risk Scenarios</div>';
    risk.scenarios.forEach(sc=>{
      const sev=sc.severity||'moderate';
      h+=`<div class="risk-card sev-${sev}">`;
      h+=`<div class="risk-title"><span class="risk-badge ${sev}">${sev}</span> ${esc(sc.title||'Scenario')}</div>`;
      h+=`<div class="risk-desc">${esc(sc.description||'')}</div>`;
      h+=`<div class="risk-meta"><span>P=${(sc.probability*100).toFixed(0)}%</span><span>Cost: €${fmt(sc.cost_if_triggered)}</span><span>Regret: €${fmt(sc.expected_regret)}</span></div>`;
      if(sc.affected_days&&sc.affected_days.length)h+=`<div class="risk-meta" style="margin-top:2px">Affected: ${sc.affected_days.join(', ')}</div>`;
      if(sc.mitigation)h+=`<div class="risk-mitigation">${esc(sc.mitigation)}</div>`;
      h+='</div>';
    });
    h+='</div>';
  }

  // ── Errors ──
  if(r.error_count>0){h+='<div class="kpi-row">';h+=kpi('Errors',r.error_count+' issues','Check logs','err','One or more pipeline agents encountered errors during execution. Check the activity feed for details. Errors may mean some corrections were skipped or fallback values were used, which could reduce plan quality.');h+='</div>'}
  h+='</div>';

  // ── Staffing plan table ──
  if(plan.length){
    h+='<div class="res-section"><div class="rs-title">Staffing plan</div>';
    h+='<table class="plan-tbl"><thead><tr><th>Date</th><th>Person-days</th></tr></thead><tbody>';
    plan.forEach(p=>{h+=`<tr><td>${p.date}</td><td>${p.pd}</td></tr>`});
    h+='</tbody></table></div>';
  }

  // ── Knowledge updates with staleness ──
  if(r.knowledge&&r.knowledge.length){
    const staleTag=r.knowledge_stale>0?' <span style="color:var(--red);font-weight:500">'+r.knowledge_stale+' stale</span>':'';
    h+='<div class="res-section"><div class="rs-title">Knowledge updates ('+r.knowledge_count+')'+staleTag+'</div>';
    r.knowledge.forEach(k=>{
      const isStale=k.status==='stale';
      const staleStyle=isStale?'opacity:0.55;text-decoration:line-through':'';
      const ageTag=k.days_since?'<span style="color:var(--black-40);font-size:12px"> '+k.days_since+'d ago</span>':'';
      h+=`<div style="font-size:14px;color:var(--black-60);padding:3px 0;${staleStyle}"><span style="font-family:var(--mono);color:var(--black)">${esc(k.id)}</span> ${esc(k.status)} <span style="color:var(--black-40)">conf: ${k.confidence}</span>${ageTag}</div>`;
    });
    h+='</div>';
  }

  // ── Debrief ──
  if(r.debrief){
    h+='<div class="res-section"><div class="rs-title">Debrief report</div>';
    h+='<div class="debrief-box">'+formatDebrief(r.debrief)+'</div></div>';
  }

  h+='</div>';
  b.innerHTML=h;

  // ── Marketplace tab ──
  const mkt=r.marketplace||{};
  if(mkt.total_atoms){
    $('marketTab').style.display='';
    let mh='<div class="res-wrap">';
    mh+='<div class="res-section"><div class="rs-title">Marketplace Summary</div><div class="kpi-row">';
    mh+=kpi('Atoms',mkt.total_atoms,'open: '+mkt.open_atoms+', claimed: '+mkt.claimed_atoms+', filled: '+mkt.filled_atoms,'','Micro-shift units generated from the approved plan. Each atom is a time-slot and activity combination that can be posted to the flex marketplace for temp workers to claim. Open atoms still need workers; claimed are reserved; filled are confirmed.');
    mh+=kpi('Fill Rate',mkt.fill_rate_pct+'%',mkt.total_headcount_filled+'/'+mkt.total_headcount_needed+' headcount',mkt.fill_rate_pct<50?'warn':'','Percentage of required headcount that has been filled through the marketplace. Below 50% means significant staffing gaps remain. The fill rate typically starts at 0% when a plan is first published and increases as temp workers claim shifts.');
    mh+='</div><div class="kpi-row">';
    mh+=kpi('Revenue','\u20ac'+fmt(mkt.total_revenue_eur),'From claimed atoms','','Total revenue from marketplace transactions for claimed shift atoms. This reflects the cost of flex labour engaged through the platform. Higher revenue with good fill rate means the marketplace is actively solving staffing gaps.');
    const acts=mkt.activities||{};
    const actStr=Object.entries(acts).map(([k,v])=>k+': '+v).join(', ');
    mh+=kpi('Activities',Object.keys(acts).length+' types',actStr||'N/A','','Breakdown of marketplace atoms by warehouse activity type (e.g. picking, packing, receiving, loading). Helps identify which activities have the most demand for flex workers and where staffing gaps are concentrated.');
    mh+='</div></div></div>';
    $('marketBody').innerHTML=mh;
  }

  // Show the results tab and auto-switch
  $('resultsTab').style.display='';
  showTab('results');
}

function fmt(n){return n!=null?Number(n).toLocaleString('de-DE',{maximumFractionDigits:0}):'—'}

function kpi(label,val,sub,cls,tip){
  const tipHtml=tip?`<span class="kpi-tip" data-tip="${esc(tip)}">?</span>`:'';
  return `<div class="kpi ${cls}"><div class="kpi-label">${label}${tipHtml}</div><div class="kpi-val">${val}</div><div class="kpi-sub">${sub}</div></div>`;
}

function formatDebrief(md){
  return md.replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

function showTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('show'));
  if(name==='results'){
    $('resultsTab').classList.add('active');
    $('resultsPanel').classList.add('show');
  } else if(name==='market'){
    $('marketTab').classList.add('active');
    $('marketPanel').classList.add('show');
  } else {
    document.querySelector('.tab-btn').classList.add('active');
    $('feedPanel').classList.add('show');
  }
}

function showReviewPanel(r){
  // Remove any existing overlay
  const old=document.querySelector('.review-overlay');
  if(old)old.remove();

  const plan=r.plan||[];
  const risk=r.risk_assessment||{};
  const cost=r.cost_summary||{};
  const scenarios=risk.scenarios||[];
  const riskScore=risk.overall_risk_score||0;
  const riskLevel=riskScore>=80?'critical':riskScore>=50?'elevated':riskScore>=25?'moderate':'low';

  let h='<div class="review-panel">';
  h+='<h2>Human review required</h2>';

  // Plan table
  h+='<div class="rs-title">Proposed Staffing Plan</div>';
  h+='<table class="review-plan-table"><tr><th>Date</th><th>Person-Days</th></tr>';
  let totalPd=0;
  plan.forEach(p=>{h+='<tr><td>'+p.date+'</td><td>'+p.pd+'</td></tr>';totalPd+=p.pd});
  h+='<tr style="border-top:1px solid var(--black-20);font-weight:500"><td>Total</td><td>'+totalPd.toFixed(1)+'</td></tr>';
  h+='</table>';

  // Risk summary
  if(scenarios.length){
    h+='<div class="rs-title">Risk Assessment</div>';
    h+='<div class="review-risk-summary">';
    h+='<div><div class="review-risk-score '+riskLevel+'">'+riskScore+'</div>';
    h+='<div class="review-risk-label">Risk Score</div></div>';
    h+='<div style="flex:1;font-size:14px;color:var(--black-60);padding:4px 0">';
    h+='<div>'+scenarios.length+' failure scenarios identified</div>';
    const regret=risk.total_expected_regret||0;
    h+='<div style="margin-top:4px">Expected regret: <b style="color:var(--red)">€'+fmt(regret)+'</b></div>';
    const fragile=risk.fragile_days||[];
    if(fragile.length)h+='<div style="margin-top:4px">Fragile days: '+fragile.join(', ')+'</div>';
    h+='</div></div>';

    // Scenario cards
    scenarios.forEach((s,i)=>{
      const sev=(s.severity||'moderate').toLowerCase();
      h+='<div class="risk-card" style="margin-bottom:8px">';
      h+='<div class="risk-title"><span class="risk-badge '+sev+'">'+(s.severity||'?')+'</span> '+(s.title||'Scenario '+(i+1))+'</div>';
      h+='<div class="risk-desc">'+(s.description||'')+'</div>';
      h+='<div class="risk-meta">';
      h+='<span>P: '+(s.probability_pct||'?')+'%</span>';
      h+='<span>Cost: €'+fmt(s.estimated_cost_eur||0)+'</span>';
      h+='<span>Regret: €'+fmt(s.expected_regret_eur||0)+'</span>';
      h+='</div>';
      if(s.mitigation)h+='<div class="risk-mitigation">↳ '+s.mitigation+'</div>';
      h+='</div>';
    });
  }

  // Buttons
  h+='<div class="review-actions">';
  h+='<button class="btn-reject" onclick="sendDecision(false)">Reject plan</button>';
  h+='<button class="btn-approve" onclick="sendDecision(true)">Approve plan</button>';
  h+='</div></div>';

  const overlay=document.createElement('div');
  overlay.className='review-overlay';
  overlay.innerHTML=h;
  document.body.appendChild(overlay);
}

function sendDecision(approved){
  const reason=approved?'Planner approved via dashboard':'Planner rejected via dashboard';
  if(ws&&ws.readyState===1){
    ws.send(JSON.stringify({type:'human_decision',approved,reason}));
  }
  const overlay=document.querySelector('.review-overlay');
  if(overlay)overlay.remove();

  // Show feedback in feed
  const feed=$('feed');
  const r=document.createElement('div');
  r.className='row hi';
  r.innerHTML=
    `<span class="r-t">${new Date().toLocaleTimeString()}</span>`+
    `<span class="r-a">human_review</span>`+
    `<span class="r-b"><b>decision</b> ${approved?'Approved':'Rejected'} by planner</span>`;
  feed.appendChild(r);
  feed.scrollTop=feed.scrollHeight;
}

function done(){
  document.querySelectorAll('.g-node.active').forEach(n=>n.classList.remove('active'));
  const s=t0?((Date.now()-t0)/1000).toFixed(1):'?';
  $('sDot').className='dot ok';$('sTxt').textContent='Complete '+s+'s';
  if(ti)clearInterval(ti);
  const d=document.createElement('div');d.className='f-done';
  d.textContent='Pipeline completed in '+s+'s';
  $('feed').appendChild(d);
}

function tick(){
  $('timer').classList.add('on');
  ti=setInterval(()=>{
    const e=Math.floor((Date.now()-t0)/1000);
    $('timer').textContent=String(e/60|0).padStart(2,'0')+':'+String(e%60).padStart(2,'0');
  },200);
}

function $(id){return document.getElementById(id)}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}


function showWeekPicker(m){
  const old=document.querySelector('.week-overlay');
  if(old)old.remove();

  const weeks=m.weeks||[];
  let h='<div class="week-panel">';
  h+='<h2>Select a week</h2>';
  h+='<div class="wp-sub">Choose which week to run the pipeline for.</div>';
  h+='<div class="week-list">';
  weeks.forEach(w=>{
    const badge=w.has_actuals
      ?'<span class="wi-badge training">training</span>'
      :'<span class="wi-badge holdout">holdout</span>';
    h+=`<div class="week-item" onclick="sendWeekSelection(${w.index})">`;
    h+=`<span class="wi-label">Week ${w.index}</span>`;
    h+=`<span class="wi-date">${w.week_start}</span>`;
    h+=badge;
    h+='</div>';
  });
  h+='</div></div>';

  const overlay=document.createElement('div');
  overlay.className='week-overlay';
  overlay.innerHTML=h;
  document.body.appendChild(overlay);
}

function sendWeekSelection(idx){
  if(ws&&ws.readyState===1){
    ws.send(JSON.stringify({type:'week_selected',week_index:idx}));
  }
  const overlay=document.querySelector('.week-overlay');
  if(overlay)overlay.remove();

  $('sTxt').textContent='Week '+idx+' selected';
  const feed=$('feed');
  const r=document.createElement('div');
  r.className='row hi';
  r.innerHTML=
    `<span class="r-t">${new Date().toLocaleTimeString()}</span>`+
    `<span class="r-a">system</span>`+
    `<span class="r-b"><b>week_selected</b> Running pipeline for week ${idx}</span>`;
  feed.appendChild(r);
  feed.scrollTop=feed.scrollHeight;
}

connect();
</script>
</body>
</html>
